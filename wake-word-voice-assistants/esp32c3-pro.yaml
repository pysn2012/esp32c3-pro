# 全局变量
substitutions:
  device_name: esp32c3-pro
  friendly_name: esp32c3-pro
  
  # 仅有2种颜色
  bg_color: "000000"    # 黑色背景
  text_color: "FFFFFF"  # 白色文字

  # 语音助手不同阶段的ID，用于内部逻辑判断和显示切换
  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"

  # 允许显示的字符集。此列表非常庞大，包含了多语言字符。
  allowed_characters: |-
    静音状态加载未连接出错了待机聆听思考回复·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突
  on_boot:  # 开机启动逻辑
    priority: 600
    then:
      - script.execute: draw_display
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # === 高安全性优化（推荐必加）===
      CONFIG_COMPILER_OPTIMIZATION_ASSERTION_LEVEL: 0
      CONFIG_LOG_DEFAULT_LEVEL: 1
      
      # === 中等安全性优化（可选）===
      # C3 单核不需要 SMP 相关代码
      CONFIG_FREERTOS_UNICORE: y
      
  advanced:
    compiler_optimization: SIZE
    enable_full_printf: false
    disable_debug_stubs: true
    disable_ocd_aware: true

api:
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

# 按钮：GPIO9 BOOT按键，长按10秒触发恢复出厂设置
button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    id: boot_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn

# I2C 总线
i2c:
  - id: i2c_bus
    scl: GPIO6
    sda: GPIO5

# I2S 音频总线
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO3     # ← SCK
    i2s_lrclk_pin: GPIO4    # ← WS

# INMP441
microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO18     # SD
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    channel: left           # 声道 (L/R接GND=left, 接VCC=right)

# MAX 98357A
speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO19
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right           # MAX 98357A默认是右声道
    buffer_duration: 100ms

# 媒体播放器，用于播放TTS和提示音
media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    on_announcement:
      # 如果麦克风正在录音，则停止唤醒词（mWW或VA）
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            # Ensure VA stops before moving on
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      # 语音助手（VA）未运行，这是用户主动发起的媒体播放。显示静音界面。
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # 语音助手（VA）未运行，这是用户主动发起的媒体播放结束。重新启动唤醒词。
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

# 设备端唤醒词引擎 (microWakeWord)
micro_wake_word:
  id: mww
  models:
    - okay_nabu
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# 语音助手核心配置
voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # 定义了语音助手各个生命周期事件的回调，如开始监听、结束监听、开始播放TTS等。
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display

  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: draw_display

  on_end:
    # 短暂等待，以确认是否有播报开始
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # 播报已完成，I2S总线已空闲
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    # 如果启用了手动唤醒词（mWW），则仅重启它；流式唤醒词会自动重启
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    # 清除文本传感器
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display

# 脚本 (Scripts): 封装了可重用的逻辑块
script:
  # 核心脚本：根据当前状态（WiFi/HA连接、语音助手阶段）决定显示哪个页面
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_listening_phase_id}:
                                id(oled128).show_page(listening_page);
                                id(oled128).update();
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(oled128).show_page(thinking_page);
                                id(oled128).update();
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(oled128).show_page(replying_page);
                                id(oled128).update();
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(oled128).show_page(error_page);
                                id(oled128).update();
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(oled128).show_page(muted_page);
                                id(oled128).update();
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(oled128).show_page(no_ha_page);
                                id(oled128).update();
                                break;
                              default:
                                id(oled128).show_page(idle_page);
                                id(oled128).update();
                            }
                      else:
                        - display.page.show: no_ha_page
                        - component.update: oled128
                else:
                  - display.page.show: no_wifi_page
                  - component.update: oled128
          else:
            - display.page.show: initializing_page
            - component.update: oled128

  # 根据配置的位置启动mWW或流式唤醒词
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # 根据配置的位置停止mWW或流式唤醒词
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:
  # 根据软件静音开关的状态，将语音助手阶段设置为空闲或静音
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};

          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};


# 开关 (Switches)
switch:
  # 软件静音开关
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display

# 选择器 (Select): 允许用户在UI中选择唤醒词引擎运行位置（设备端或HA端）
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

# 全局变量 (Globals): 用于在不同组件间共享状态
globals:
  # 标记设备是否仍在初始化
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  # 当前语音助手所处的阶段ID
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}

# 字体 (Fonts)
font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: font_main
    size: 12
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

# 文本传感器 (Text Sensors): 用于在UI中显示请求和回复的文本
text_sensor:
  - id: text_request
    platform: template

  - id: text_response
    platform: template

# 颜色定义 (Colors): 将HEX颜色值定义为ID，方便在显示逻辑中引用
color:
  - id: bg_color
    hex: ${bg_color}
  - id: text_color
    hex: ${text_color}

# 显示屏 (Display): OLED
display:
  - platform: ssd1306_i2c
    id: oled128
    model: "SSD1306 128x64"
    i2c_id: i2c_bus
    address: 0x3C
    flip_x: false
    update_interval: never
    # 定义了多个显示页面，每个页面是一个独立的绘制函数
    pages:
      # 空闲页面
      - id: idle_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(30, 20, id(font_main), id(text_color), "%s", "待机状态");
      # 监听页面
      - id: listening_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(30, 20, id(font_main), id(text_color), "%s", "聆听ing");
      # 思考页面
      - id: thinking_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(0, 0, id(font_main), id(text_color), "%s", "思考ing");
      # 回复页面
      - id: replying_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(0, 0, id(font_main), id(text_color), "%s", "回复ing");
      # 错误页面
      - id: error_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(25, 20, id(font_main), id(text_color), "%s", "出错了");
      # 无Home Assistant页面
      - id: no_ha_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(25, 20, id(font_main), id(text_color), "%s", "未连接HA");
      # 无WiFi页面
      - id: no_wifi_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(25, 20, id(font_main), id(text_color), "%s", "未连接wifi");
      # 初始化页面
      - id: initializing_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(35, 20, id(font_main), id(text_color), "%s", "加载ing");
      # 静音页面
      - id: muted_page
        lambda: |-
          it.fill(id(bg_color));
          it.printf(35, 20, id(font_main), id(text_color), "%s", "静音状态");