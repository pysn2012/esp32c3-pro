# 全局变量
substitutions:
  device_name: c4002
  friendly_name: c4002
  allowed_characters: "状态：距离无目标静止存在运动中未知.0123456789m"

# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突


esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: ../components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# UART配置
uart:
  id: uart_bus
  tx_pin: GPIO0
  rx_pin: GPIO1
  baud_rate: 115200

# DFRobot C4002 毫米波雷达组件配置
dfrobot_c4002:
  id: my_c4002

# 传感器配置部分
sensor:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    movement_distance:
      name: "Motion Distance"
      id: movement_distance_sensor  # 运动距离
    existing_distance:
      name: "Presence Distance"
      id: existing_distance_sensor  # 存在距离
    movement_speed:
      name: "Motion Speed"          # 目标移动速度
      id: movement_speed_sensor
    movement_direction:
      name: "Motion Direction"
      id: movement_direction_sensor  # 运动方向
      internal: true
    target_status:
      name: "Target Status"          # 当前目标状态（内部使用，不在前端显示）
      id: target_status_sensor
      internal: true

text_sensor:
  # 运动方向文本传感器（将数值转为中文描述）
  - platform: template
    name: "Movement Direction"
    id: movement_direction_text
    icon: "mdi:directions"
    lambda: |-
      int d = id(movement_direction_sensor).state;
      if (d == 0) return {"远离"};
      else if (d == 1) return {"无方向"};
      else if (d == 2) return {"靠近"};
      else return {"未知"};
    update_interval: 0.5s

  # 目标状态文本传感器（将数值转为中文描述）
  - platform: template
    name: "Target Status"
    id: target_status_text
    icon: "mdi:human-greeting"
    lambda: |-
      int d = id(confirmed_status);
      if (d == 0) return {"无目标"};
      else if (d == 1) return {"静止存在"};
      else if (d == 2) return {"运动中"};
      else return {"未知"};
    update_interval: 0.5s

  - platform: dfrobot_c4002
    c4002_id: my_c4002
    c4002_text_sensor:
      name: "C4002 log"
      icon: "mdi:message-text-outline"

# 开关配置部分
switch:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    switch_out_led:
      name: "Out LED Switch"   # 控制 OUT 状态指示灯
    switch_run_led:
      name: "Run LED Switch"   # 控制 RUN 运行指示灯
    switch_factory_reset:
      name: "Factory Reset"    # 触发雷达恢复出厂设置
    switch_environmental_calibration:
      name: "Sensor Calibration"  # 触发雷达环境自适应校准

# Select 配置部分
select:
  # 雷达输出工作模式选择
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    operating_mode:
      name: "OUT Mode"
      options:
        - "Mode_1"
        - "Mode_2" 
        - "Mode_3"

# 最小和最大检测范围配置
number:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    max_range:
      name: "Max detection distance"   # 雷达最大探测范围设置
    min_range:
      name: "Min detection distance"   # 雷达最小探测范围设置（盲区）
    light_threshold:
      name: "Light Threshold"          # 光敏触发阈值（需硬件支持光敏）
    target_disappeard_delay_time:
      name: "Target Disappear Delay Time"  # 目标离开后保持"存在"状态的延迟时长

# 全局变量：防抖状态机
globals:
  - id: confirmed_status
    type: int
    restore_value: no
    initial_value: '0'        # 0=无目标, 1=静止, 2=运动

  - id: pending_status
    type: int
    restore_value: no
    initial_value: '0'        # 待确认的新状态

  - id: status_change_timer
    type: int
    restore_value: no
    initial_value: '0'        # 状态变化时刻的 millis() 时间戳

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 12                        # 字号：12
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错

# I2C 总线
i2c:
  - id: i2c_bus
    scl: GPIO6
    sda: GPIO5

# 显示屏 (Display): OLED
display:
  - platform: ssd1306_i2c
    id: oled128
    model: "SSD1306 128x64"
    i2c_id: i2c_bus
    address: 0x3C
    flip_x: false
    update_interval: 500ms
    lambda: |-
      it.fill(COLOR_OFF);
      // 第一行：目标状态
      it.printf(10, 10, id(cn_font), "状态：%s", id(target_status_text).state.c_str());
      // 第二行：存在距离
      if (!isnan(id(existing_distance_sensor).state)) {
        it.printf(10, 42, id(cn_font), "距离：%.1fm", id(existing_distance_sensor).state);
      } else {
        it.printf(10, 42, id(cn_font), "距离：--");
      }

# I2S 音频总线
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO3     # ← SCK
    i2s_lrclk_pin: GPIO4    # ← WS


# INMP441
microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO18     # SD
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    channel: left           # 声道 (L/R接GND=left, 接VCC=right)

# MAX 98357A
speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO19
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right           # MAX 98357A默认是右声道
    buffer_duration: 100ms

# 媒体播放器，用于播放TTS和提示音
media_player:
  - platform: speaker
    name: "ESP32C3 Speaker"
    id: speaker_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    files:
      - id: come_sound
        file: "../sounds/come.wav"
      - id: leave_sound
        file: "../sounds/leave.wav"
        
# 自定义脚本：防抖处理 + 播报
script:
  # --- 核心防抖脚本（每 100ms 由 interval 调用）---
  - id: debounce_handler
    mode: single
    then:
      - lambda: |-
          int raw_status = id(target_status_sensor).state;

          // 忽略无效值（初始化时可能为 NaN）
          if (isnan(raw_status)) {
            return;
          }

          // 如果原始状态与已确认状态一致，重置待处理状态
          if (raw_status == id(confirmed_status)) {
            id(pending_status) = raw_status;
            id(status_change_timer) = 0;
            return;
          }

          unsigned long now = millis();

          // 检测到新状态，开始计时
          if (raw_status != id(pending_status)) {
            id(pending_status) = raw_status;
            id(status_change_timer) = now;
            ESP_LOGD("debounce", "状态变化检测: %d -> %d, 开始计时",
                     id(confirmed_status), raw_status);
          }
          // 待确认状态持续中，检查是否达到防抖时间
          else {
            unsigned long elapsed = now - (unsigned long)id(status_change_timer);
            unsigned long debounce_time;

            // 人来防抖 1.5s（避免快速误触发）
            // 人走防抖 3.0s（避免短暂消失误报，如静坐微动）
            if (raw_status == 0) {
              debounce_time = 3000;
            } else {
              debounce_time = 1500;
            }

            if (elapsed >= debounce_time) {
              int old_status = id(confirmed_status);
              id(confirmed_status) = raw_status;
              id(status_change_timer) = 0;

              ESP_LOGI("debounce", "✅ 状态确认: %d -> %d (耗时 %lu ms)",
                       old_status, raw_status, elapsed);

              // 触发对应播报
              if (raw_status != 0) {
                id(play_arrived_sound).execute();
              } else {
                id(play_left_sound).execute();
              }
            }
          }

  # --- 播报：有人来了 ---
  - id: play_arrived_sound
    mode: single
    then:
      - logger.log:
          format: "🔔 播报：有人来了"
          tag: "c4002"
      - media_player.speaker.play_on_device_media_file:
          media_file: come_sound
          announcement: true

  # --- 播报：有人离开了 ---
  - id: play_left_sound
    mode: single
    then:
      - logger.log:
          format: "🔔 播报：有人离开了"
          tag: "c4002"
      - media_player.speaker.play_on_device_media_file:
          media_file: leave_sound
          announcement: true

# 定时器：每 100ms 执行一次防抖检查
interval:
  - interval: 100ms
    then:
      - script.execute: debounce_handler
