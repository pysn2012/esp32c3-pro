# 全局变量
substitutions:
  device_name: c4002
  friendly_name: c4002
  allowed_characters: "状态：距离无目标静止存在运动中未知.0123456789mM(-)"

# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突


esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: ../components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# UART配置
uart:
  id: uart_bus
  tx_pin: GPIO0
  rx_pin: GPIO1
  baud_rate: 115200

# DFRobot C4002 毫米波雷达组件配置
dfrobot_c4002:
  id: my_c4002

# 传感器配置部分
sensor:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    movement_distance:
      name: "1.运动距离"
      id: movement_distance_sensor  # 运动距离
    existing_distance:
      name: "2.存在距离"
      id: existing_distance_sensor  # 存在距离
    movement_speed:
      name: "3.运动速度"          # 目标移动速度
      id: movement_speed_sensor
    movement_direction:
      name: "Movement Direction"
      id: movement_direction_sensor  # 运动方向
    target_status:
      name: "Target Status"          # 当前目标状态（内部使用，不在前端显示）
      id: target_status_sensor
    light:
      name: "0.光照强度"           # 雷达内置光照传感器
      id: light_sensor
      accuracy_decimals: 1

text_sensor:
  # 运动方向文本传感器（将数值转为中文描述）
  - platform: template
    name: "4.运动方向(文本)"
    id: movement_direction_text
    icon: "mdi:directions"
    lambda: |-
      int d = id(movement_direction_sensor).state;
      if (d == 0) return {"远离"};
      else if (d == 1) return {"无方向"};
      else if (d == 2) return {"靠近"};
      else return {"未知"};
    update_interval: 0.5s

  # 目标状态文本传感器（将数值转为中文描述）
  - platform: template
    name: "5.目标状态(文本)"
    id: target_status_text
    icon: "mdi:human-greeting"
    lambda: |-
      int d = id(target_status_sensor).state;
      if (isnan(d)) return {"未知"};
      if (d == 0) return {"无目标"};
      else if (d == 1) return {"静止存在"};
      else if (d == 2) return {"运动中"};
      else return {"未知"};
    update_interval: 0.5s

  - platform: dfrobot_c4002
    c4002_id: my_c4002
    c4002_text_sensor:
      name: "C4002日志"
      icon: "mdi:message-text-outline"

# 开关配置部分
switch:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    switch_out_led:
      name: "Out LED开关"   # 控制 OUT 状态指示灯
    switch_run_led:
      name: "Run LED开关"   # 控制 RUN 运行指示灯
    switch_factory_reset:
      name: "8.恢复出厂设置"    # 触发雷达恢复出厂设置
    switch_environmental_calibration:
      name: "9.传感器校准"  # 触发雷达环境自适应校准

# Select 配置部分
select:
  # 雷达输出工作模式选择
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    operating_mode:
      name: "OUT Mode"
      options:
        - "Mode_1"
        - "Mode_2" 
        - "Mode_3"

# 最小和最大检测范围配置
number:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    max_range:
      name: "11.最大探测距离"   # 雷达最大探测范围设置
    min_range:
      name: "12.最小探测距离"   # 雷达最小探测范围设置（盲区）
    light_threshold:
      name: "13.光敏触发阈值"          # 光敏触发阈值（需硬件支持光敏）
    target_disappeard_delay_time:
      name: "Target Disappear Delay Time"  # 目标离开后保持"存在"状态的延迟时长

# 全局变量
globals:
  - id: prev_raw_status
    type: int
    restore_value: no
    initial_value: '-1'       # -1=未初始化, 0=无目标, 1=静止, 2=运动

  - id: light_threshold_lux
    type: float
    restore_value: yes
    initial_value: '25.0'      # 光照低于此值(lx)认为是晚上，需要补光

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 12                        # 字号：12
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错

# LED 补光灯 (GPIO7)
output:
  - platform: gpio
    pin: GPIO7
    id: led_output

light:
  - platform: binary
    output: led_output
    name: "LED灯"
    id: led_light

# I2C 总线
i2c:
  - id: i2c_bus
    scl: GPIO6
    sda: GPIO5

# 显示屏 (Display): OLED
display:
  - platform: ssd1306_i2c
    id: oled128
    model: "SSD1306 128x64"
    i2c_id: i2c_bus
    address: 0x3C
    flip_x: false
    update_interval: 500ms
    lambda: |-
      it.fill(COLOR_OFF);
      // 第一行：目标状态
      it.printf(10, 10, id(cn_font), "状态：%s", id(target_status_text).state.c_str());
      // 第二行：根据状态显示对应距离
      //   运动中 → 显示运动距离（existTargetDist 会滞后）
      //   静止中 → 显示存在距离
      //   无目标 → 显示 --
      int status = id(target_status_sensor).state;
      if (status == 2) {
        // 运动中：显示运动距离
        if (!isnan(id(movement_distance_sensor).state)) {
          it.printf(10, 42, id(cn_font), "距离：%.1fm(M)", id(movement_distance_sensor).state);
        } else {
          it.printf(10, 42, id(cn_font), "距离：--(M)");
        }
      } else if (status == 1) {
        // 静止存在：显示存在距离
        if (!isnan(id(existing_distance_sensor).state)) {
          it.printf(10, 42, id(cn_font), "距离：%.1fm", id(existing_distance_sensor).state);
        } else {
          it.printf(10, 42, id(cn_font), "距离：--");
        }
      } else {
        it.printf(10, 42, id(cn_font), "距离：--");
      }

# I2S 音频总线
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO3     # ← SCK
    i2s_lrclk_pin: GPIO4    # ← WS

# MAX 98357A
speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO19
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right           # MAX 98357A默认是右声道
    buffer_duration: 100ms

# RTTTL 播放器
rtttl:
  id: rtttl_player
  speaker: box_speaker

# 脚本：音乐播报 + LED灯控制
script:
  # 有人来了
  - id: on_arrive
    mode: single
    then:
      - rtttl.play:
          rtttl: "come:d=16,o=5,b=240:16c6,16e6,16g6,8c7"
      - if:
          condition:
            lambda: |-
              float lux = id(light_sensor).state;
              float threshold = id(light_threshold_lux);
              return !isnan(lux) && lux < threshold;
          then:
            - light.turn_on: led_light
            - logger.log:
                format: "光线暗，开启补光灯"
                tag: "c4002"
          else:
            - logger.log:
                format: "光线充足，无需补光"
                tag: "c4002"

  # 人离开
  - id: on_leave
    mode: single
    then:
      - rtttl.play:
          rtttl: "leave:d=16,o=5,b=240:16c7,16g6,16e6,8c6"
      - if:
          condition:
            light.is_on: led_light
          then:
            - light.turn_off: led_light
            - logger.log:
                format: "人已离开，关闭补光灯"
                tag: "c4002"

  # 状态变化检测
  - id: status_monitor
    mode: single
    then:
      - lambda: |-
          int raw = id(target_status_sensor).state;
          if (isnan(raw)) return;

          int prev = id(prev_raw_status);

          // 状态没变，跳过
          if (prev == raw) return;

          // 记录新状态
          id(prev_raw_status) = raw;

          // 刚启动时 prev<0，不触发
          if (prev < 0) return;

          // 无人(0) → 有人(1/2)
          if (prev == 0 && raw != 0) {
            ESP_LOGI("c4002", "检测到有人进入 (状态: %d)", raw);
            id(on_arrive).execute();
          }
          // 有人(1/2) → 无人(0)
          else if (prev != 0 && raw == 0) {
            ESP_LOGI("c4002", "检测到人已离开");
            id(on_leave).execute();
          }

# 定时器：每 200ms 检测一次状态变化
interval:
  - interval: 200ms
    then:
      - script.execute: status_monitor