# 全局变量
substitutions:
  device_name: c4002
  friendly_name: c4002

# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突


esp32:
  variant: esp32c5
  flash_size: 4MB
  framework:
    type: esp-idf

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# UART配置
uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

# C4002 组件配置
dfrobot_c4002:
  id: my_c4002

# 传感器配置部分
sensor:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    movement_distance:
      name: "Motion Distance"
      id: movement_distance_sensor  # 运动距离
    existing_distance:
      name: "Presence Distance"
      id: existing_distance_sensor  # 存在距离
    movement_speed:
      name: "Motion Speed"
      id: movement_speed_sensor
    movement_direction:
      name: "Motion Direction"
      id: movement_direction_sensor  # 运动方向
      internal: true
    target_status:
      name: "Target Status"
      id: target_status_sensor
      internal: true

text_sensor:
  - platform: template
    name: "Movement Direction"
    id: movement_direction_text
    icon: "mdi:directions"
    lambda: |-
      int d = id(movement_direction_sensor).state;
      if (d == 0) return {"Approaching"};
      else if (d == 1) return {"No Direction"};
      else if (d == 2) return {"Away"};
      else return {"未知"};
    update_interval: 1s

  - platform: template
    name: "Target Status"
    id: target_status_text
    icon: "mdi:human-greeting"
    lambda: |-
      int d = id(target_status_sensor).state;
      if (d == 0) return {"No Target"};
      else if (d == 1) return {"Static Presence"};
      else if (d == 2) return {"Motion"};
      else return {"未知"};
    update_interval: 0.5s

  - platform: dfrobot_c4002
    c4002_id: my_c4002
    c4002_text_sensor:
      name: "C4002 log"
      icon: "mdi:message-text-outline"

# 开关配置部分
switch:
  - platform: dfrobot_c4002
    switch_out_led:
      name: "Out LED Switch"
    switch_run_led:
      name: "Run LED Switch"
    switch_factory_reset:
      name: "Factory Reset"
    switch_environmental_calibration:
      name: "Sensor Calibration"

# Select 配置部分
select:
  - platform: dfrobot_c4002
    c4002_id: my_c4002
    operating_mode:
      name: "OUT Mode"
      options:
        - "Mode_1"
        - "Mode_2" 
        - "Mode_3"

# 最小和最大检测范围配置
number:
  - platform: dfrobot_c4002
    max_range:
      name: "Max detection distance"
    min_range:
      name: "Min detection distance"
    light_threshold:
      name: "Light Threshold"
    target_disappeard_delay_time:
      name: "Target Disappear Delay Time"
